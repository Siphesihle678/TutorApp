<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Teacher Key Generator</title>
    <style>
        body {
            font-family: sans-serif;
            padding: 2rem;
            max-width: 600px;
            margin: 0 auto;
            background: #f0fdf4;
        }

        .card {
            background: white;
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            border: 2px solid #22c55e;
        }

        h1 {
            color: #166534;
            margin-top: 0;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 0.8rem;
            margin-bottom: 1rem;
            border: 1px solid #ccc;
            border-radius: 0.5rem;
        }

        button {
            background: #166534;
            color: white;
            padding: 1rem 2rem;
            border: none;
            border-radius: 0.5rem;
            cursor: pointer;
            font-size: 1rem;
        }

        .result {
            margin-top: 2rem;
            font-size: 2rem;
            font-weight: bold;
            color: #166534;
            font-family: monospace;
            text-align: center;
            border: 2px dashed #22c55e;
            padding: 1rem;
            background: #dcfce7;
        }
    </style>
</head>

<body>
    <div class="card">
        <h1>🔑 Key Generator</h1>
        <p>Enter the Student's Machine ID shown on their lock screen.</p>

        <label>Student Machine ID:</label>
        <input type="text" id="machine-id" placeholder="e.g. LAPTOP-X7B2">

        <button onclick="generate()">Generate Unlock Key</button>

        <div id="output" class="result" style="display:none"></div>
    </div>

    <script>
        function generate() {
            const hostname = document.getElementById('machine-id').value.trim().toUpperCase();
            if (!hostname) return;

            const salt = "CAT2026";
            const rawString = hostname + salt;
            const expectedKey = btoa(rawString).substring(0, 6).toUpperCase();

            const out = document.getElementById('output');
            out.innerText = expectedKey;
            out.style.display = 'block';
        }
    </script>
</body>

</html>
